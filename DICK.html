<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貪吃的老二</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Press Start 2P', monospace;
  }
  #game-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 1.5rem 0.5rem 2rem;
    user-select: none;
  }
  #hud {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 320px; margin-bottom: 12px;
  }
  .hud-label { font-size: 9px; color: #888; }
  .hud-val { font-size: 13px; color: #fff; margin-top: 3px; }

  #canvas-wrap {
    position: relative;
    border: 2px solid #444;
    border-radius: 6px;
    overflow: hidden;
    background: #111;
    touch-action: none;
  }
  #canvas-scale-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  #gameCanvas { display: block; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    gap: 14px;
  }
  #overlay h1 { font-size: 18px; color: #7fff5a; text-align: center; line-height: 1.6; text-shadow: 0 0 12px #7fff5a88; }
  #overlay p { font-size: 8px; color: #ccc; text-align: center; line-height: 2.2; white-space: pre-line; }
  #startBtn {
    margin-top: 4px; padding: 10px 20px;
    background: #7fff5a; color: #111; border: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; cursor: pointer;
    border-radius: 4px; letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 0 #3a8a24;
  }
  #startBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #3a8a24; }
  #dpad {
    display: grid;
    grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 50px;
    gap: 5px; margin-top: 20px;
  }
  .dpad-btn {
    background: #222; border: 1.5px solid #444;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #eee;
    transition: background 0.08s, transform 0.08s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active, .dpad-btn.pressed { background: #333; transform: scale(0.92); }
  .dpad-center { cursor: default; opacity: 0; pointer-events: none; }
  #speed-indicator {
    margin-top: 14px; font-size: 8px; color: #888;
    display: flex; align-items: center; gap: 8px;
  }
  #speed-bar-wrap { width: 100px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
  #speed-bar { height: 100%; width: 0%; background: #7fff5a; border-radius: 3px; transition: width 0.4s, background 0.4s; }

  #food-gif {
    position: absolute;
    display: none;
    pointer-events: none;
    image-rendering: pixelated;
    z-index: 5;
  }
</style>
</head>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CELL = 15, COLS = 20, ROWS = 20;
const MIN_INTERVAL = 60, MAX_INTERVAL = 200;

const imgs = {};
function loadImage(key, base64) {
  return new Promise(resolve => {
    if (!base64) { imgs[key] = null; return resolve(); }
    const img = new Image();
    img.onload = () => { imgs[key] = img; resolve(); };
    img.onerror = () => { imgs[key] = null; resolve(); };
    img.src = base64;
  });
}

let snake, dir, nextDir, food, score, best = 0, running = false, loopId;
let particles = [];

function getInterval(s) {
  return Math.round(Math.max(MIN_INTERVAL, MAX_INTERVAL - s * 4.5));
}

function initGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; particles = [];
  placeFood();
  updateHUD();
}

function placeFood() {
  let pos;
  do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    spawnParticles(food.x, food.y);
    updateHUD();
    if (snake.length >= COLS * ROWS) { gameWin(); return; }
    placeFood();
    clearInterval(loopId);
    loopId = setInterval(step, getInterval(score));
  } else { snake.pop(); }
  draw();
}

function spawnParticles(gx, gy) {
  for (let i=0; i<8; i++) {
    const angle = (Math.PI*2/8)*i;
    particles.push({ x:(gx+0.5)*CELL, y:(gy+0.5)*CELL, vx:Math.cos(angle)*2.5, vy:Math.sin(angle)*2.5, life:1 });
  }
}

function drawCell(imgKey, fallbackFn, x, y, rotation) {
  ctx.save();
  ctx.translate((x + 0.5) * CELL, (y + 0.5) * CELL);
  if (rotation) ctx.rotate(rotation);
  if (imgs[imgKey]) {
    ctx.drawImage(imgs[imgKey], -CELL/2 + 1, -CELL/2 + 1, CELL - 2, CELL - 2);
  } else {
    fallbackFn();
  }
  ctx.restore();
}


function updateFoodGif() {
  const gifEl = document.getElementById('food-gif');
  if (!gifEl) return;
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();
  const size = CELL;
  gifEl.style.width = size + 'px';
  gifEl.style.height = size + 'px';
  gifEl.style.left = (food.x * CELL) + 'px';
  gifEl.style.top  = (food.y * CELL) + 'px';
  gifEl.style.display = running ? 'block' : 'none';
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'rgba(128,128,128,0.07)';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) ctx.fillRect(x*CELL,y*CELL,CELL,CELL);

  // 

  // 
  snake.forEach((seg, i) => {
    if (i === 0) return;
    drawCell('snakeBody', () => {
      ctx.fillStyle = i % 2 === 0 ? '#7fff5a' : '#3a8a24';
      ctx.beginPath();
      ctx.roundRect(-CELL/2+2, -CELL/2+2, CELL-4, CELL-4, 3);
      ctx.fill();
    }, seg.x, seg.y);
  });

  // 
  const headAngle = Math.atan2(dir.y, dir.x) + Math.PI / 2;
  drawCell('snakeHead', () => {
    ctx.fillStyle = '#a0ff70';
    ctx.beginPath();
    ctx.roundRect(-CELL/2+2, -CELL/2+2, CELL-4, CELL-4, 3);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-3, -2, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 3, -2, 2, 0, Math.PI*2); ctx.fill();
  }, snake[0].x, snake[0].y, headAngle);

  // 
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#ff5a5a';
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    p.x += p.vx; p.y += p.vy; p.life -= 0.08;
  });
  ctx.globalAlpha = 1;
  updateFoodGif();
}

function updateHUD() {
  if(score > best) best = score;
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('bestDisp').textContent = best;
  document.getElementById('levelDisp').textContent = Math.floor(score/5)+1;
  const pct = Math.min(100, Math.round((MAX_INTERVAL - getInterval(score)) / (MAX_INTERVAL - MIN_INTERVAL) * 100));
  const bar = document.getElementById('speed-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct < 40 ? '#7fff5a' : pct < 70 ? '#ffd460' : '#ff5a5a';
  const labels = ['緩慢','普通','快速','極速','瘋狂'];
  document.getElementById('speed-label').textContent = labels[Math.min(4, Math.floor(pct/20))];
}

function gameOver() {
  running = false; clearInterval(loopId);
  const ov = document.getElementById('overlay');
  ov.querySelector('h1').textContent = score > 0 ? '💀 ' + score + ' 分！' : '💀 遊戲結束';
  ov.querySelector('p').textContent = '最高紀錄：' + best + ' 分\n再試一次吧！';
  ov.style.display = 'flex';
  const gifEl = document.getElementById('food-gif'); if(gifEl) gifEl.style.display='none';
}

// ─────────────────────────────────────
let fwCanvas, fwCtx, fwAnimId, fwRockets = [];

function launchRocket() {
  const colors = ['#ffd700','#ff5a5a','#7fff5a','#5af0ff','#ff80ff','#ffaa00','#ffffff'];
  const x = Math.random() * 300;
  fwRockets.push({
    x, y: 300, vy: -(6 + Math.random()*4),
    targetY: 30 + Math.random() * 120,
    color: colors[Math.floor(Math.random()*colors.length)],
    exploded: false, particles: []
  });
}

function explodeRocket(r) {
  r.exploded = true;
  for (let i = 0; i < 60; i++) {
    const angle = (Math.PI*2/60)*i + Math.random()*0.2;
    const speed = 1.5 + Math.random()*3;
    r.particles.push({
      x: r.x, y: r.y,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 1, decay: 0.018 + Math.random()*0.012
    });
  }
}

function animFireworks() {
  fwCtx.clearRect(0,0,300,300);
  // launch new rockets periodically
  if (Math.random() < 0.06) launchRocket();

  fwRockets = fwRockets.filter(r => {
    if (!r.exploded) {
      r.y += r.vy;
      // trail
      fwCtx.beginPath();
      fwCtx.arc(r.x, r.y, 2, 0, Math.PI*2);
      fwCtx.fillStyle = r.color;
      fwCtx.globalAlpha = 0.9;
      fwCtx.fill();
      if (r.y <= r.targetY) explodeRocket(r);
      return true;
    } else {
      r.particles = r.particles.filter(p => p.life > 0);
      r.particles.forEach(p => {
        fwCtx.globalAlpha = p.life;
        fwCtx.fillStyle = r.color;
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, 2, 0, Math.PI*2);
        fwCtx.fill();
        p.x += p.vx; p.y += p.vy; p.vy += 0.05;
        p.life -= p.decay;
      });
      return r.particles.length > 0;
    }
  });
  fwCtx.globalAlpha = 1;
  fwAnimId = requestAnimationFrame(animFireworks);
}

function gameWin() {
  running = false; clearInterval(loopId);
  const gifEl = document.getElementById('food-gif'); if(gifEl) gifEl.style.display='none';

  // setup firework canvas
  fwCanvas = document.getElementById('fireworkCanvas');
  fwCanvas.width = 300; fwCanvas.height = 300;
  fwCtx = fwCanvas.getContext('2d');
  fwRockets = [];

  // show win overlay
  const wo = document.getElementById('win-overlay');
  document.getElementById('win-title').textContent = '🎆 恭喜過關！您是超級大老二 🎆';
  wo.style.display = 'flex';

  // start fireworks
  for(let i=0;i<5;i++) setTimeout(launchRocket, i*200);
  animFireworks();
}

document.getElementById('winRestartBtn').addEventListener('click', () => {
  cancelAnimationFrame(fwAnimId);
  if(fwCtx) fwCtx.clearRect(0,0,300,300);
  document.getElementById('win-overlay').style.display = 'none';
  startGame();
});

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initGame(); draw();
  running = true;
  clearInterval(loopId);
  loopId = setInterval(step, getInterval(0));
  updateFoodGif();
}

document.getElementById('startBtn').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  const map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };
  if(map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
  if(e.key===' ' && !running) startGame();
});

function setDir(d) {
  if(d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
}

function dpadPress(btn, d) {
  btn.addEventListener('pointerdown', e=>{ e.preventDefault(); btn.classList.add('pressed'); setDir(d); });
  btn.addEventListener('pointerup', ()=>btn.classList.remove('pressed'));
  btn.addEventListener('pointerleave', ()=>btn.classList.remove('pressed'));
}
dpadPress(document.getElementById('dUp'),    {x:0,y:-1});
dpadPress(document.getElementById('dDown'),  {x:0,y:1});
dpadPress(document.getElementById('dLeft'),  {x:-1,y:0});
dpadPress(document.getElementById('dRight'), {x:1,y:0});

let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; }, {passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  const dx=e.changedTouches[0].clientX-touchStartX, dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
  if(Math.abs(dx)>Math.abs(dy)) setDir({x:dx>0?1:-1,y:0});
  else setDir({x:0,y:dy>0?1:-1});
}, {passive:false});

Promise.all([
  loadImage('snakeHead', IMAGE_CONFIG.snakeHead),
  loadImage('snakeBody', IMAGE_CONFIG.snakeBody),
  loadImage('food',      IMAGE_CONFIG.food),
]).then(() => draw());

function scaleCanvas() {
  const wrap = document.getElementById('canvas-scale-wrap');
  const cw = document.getElementById('canvas-wrap');
  const available = Math.min(wrap.clientWidth, window.innerHeight * 0.55);
  const scale = Math.min(1, available / 304); // 300px canvas + 2px border each side
  cw.style.transform = 'scale(' + scale + ')';
  cw.style.transformOrigin = 'top center';
  cw.style.marginBottom = ((300 * scale) - 300) + 'px';
}
window.addEventListener('resize', scaleCanvas);
window.addEventListener('load', scaleCanvas);
